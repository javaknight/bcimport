name: CI

on:
  push:
    paths:
      - 'xologic/**'
  pull_request:
    paths:
      - 'xologic/**'

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: xologic

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version-file: xologic/.python-version
          cache: pip
          cache-dependency-path: xologic/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint
        run: pylint --fail-under=9.0 *.py

      - name: Test
        run: pytest tests/ -v
